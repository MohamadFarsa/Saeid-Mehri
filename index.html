<head>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bgg:#1d242f;
      --bg:#06090f;
      --card:#0d1117;
      --card2:#111820;
      --border:#1a2435;
      --border2:#243040;
      --accent:#38bdf8;
      --accent2:#6366f1;
      --gold:#f0c060;
      --text:#e2e8f0;
      --muted:#4a5a72;
      --muted2:#6b7e96;
      --sans:'Space Grotesk',sans-serif;
      --mono:'JetBrains Mono',monospace;
      
    }
    html,body{background:var(--bgg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

    /* starfield */
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 5%,  rgba(255,255,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 8%,  rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 60%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,.25)0%, transparent 100%),
        radial-gradient(1px 1px at 80% 55%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 90%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  85%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(600px 600px at 20% 30%, rgba(56,189,248,.05) 0%, transparent 60%),
        radial-gradient(400px 400px at 80% 70%, rgba(99,102,241,.07) 0%, transparent 60%);
      pointer-events:none;z-index:0;
    }

    .page{
      position:relative;z-index:1;
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:32px 16px;
    }

    /* ── Card ── */
    .card{
      width:100%;max-width:400px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 0 0 1px rgba(56,189,248,.07), 0 40px 100px rgba(0,0,0,.7);
      animation:rise .8s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

    /* ── Hero ── */
    .hero{
      position:relative;
      padding:40px 32px 32px;
      background:linear-gradient(160deg, #0d1117 0%, #101822 100%);
      border-bottom:1px solid var(--border);
      display:flex;flex-direction:column;align-items:center;text-align:center;
      overflow:hidden;
    }
    /* subtle line grid */
    .hero::before{
      content:'';position:absolute;inset:0;
      background-image:linear-gradient(rgba(56,189,248,.04) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(56,189,248,.04) 1px,transparent 1px);
      background-size:32px 32px;
      pointer-events:none;
    }
    /* accent glow behind photo */
    .hero::after{
      content:'';position:absolute;
      width:220px;height:220px;
      background:radial-gradient(circle, rgba(56,189,248,.15) 0%, transparent 70%);
      top:-40px;left:50%;transform:translateX(-50%);
      pointer-events:none;
    }

    /* avatar ring */
    .avatar-ring{
      position:relative;z-index:1;
      width:110px;height:110px;
      border-radius:50%;
      padding:3px;
      background:linear-gradient(135deg, var(--accent), var(--text));
      margin-bottom:20px;
      box-shadow:0 0 30px rgba(56,189,248,.25);
    }
    .avatar-ring img{
      width:100%;height:100%;
      border-radius:50%;
      object-fit:cover;
      object-position:center;
      display:block;
      border:2px solid var(--card);
    }

    /* status dot */
    .status{
      position:absolute;
      bottom:6px;right:6px;
      width:18px;height:18px;
      background:#07983c;
      border-radius:50%;
      border:3px solid var(--card);
      z-index:2;
    }
    .status::after{
      content:'';position:absolute;inset:-4px;
      border-radius:50%;
      border:2px solid rgba(34,197,94,.4);
      animation:ripple 2s infinite;
    }
    @keyframes ripple{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.8)}}

    .name{
      position:relative;z-index:1;
      font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.1;
    }
    .name-accent{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .role{
      position:relative;z-index:1;
      margin-top:8px;
      font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:.08em;
    }
    .role span{color:var(--accent);opacity:.7;}

    /* tag row */
    .tags{
      position:relative;z-index:1;
      display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center;
    }
    .tag{
      font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;
      padding:4px 10px;border-radius:100px;
      border:1px solid rgba(56,189,248,.2);
      color:var(--accent);background:rgba(56,189,248,.07);
    }

    /* ── Social icons row ── */
    .socials{
      display:flex;gap:12px;justify-content:center;
      padding:24px 32px;
      border-bottom:1px solid var(--border);
      background:var(--card2);
    }
    .soc-btn{
      width:50px;height:50px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      text-decoration:none;
      border:1px solid var(--border2);
      transition:transform .2s, border-color .2s, box-shadow .2s;
      animation:rise .8s cubic-bezier(.22,1,.36,1) both;
    }
    .soc-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .soc-btn:active{transform:scale(.94)}
    .soc-btn svg{display:block;width:22px;height:22px;}
    .soc-tg {background:rgba(41,182,246,.1);border-color:rgba(41,182,246,.25);}  .soc-tg:hover{border-color:rgba(41,182,246,.6);}
    .soc-ig {background:rgba(225,48,108,.1);border-color:rgba(225,48,108,.25);}  .soc-ig:hover{border-color:rgba(225,48,108,.6);}
    .soc-wa {background:rgba(37,211,102,.1);border-color:rgba(37,211,102,.25);}  .soc-wa:hover{border-color:rgba(37,211,102,.6);}
    .soc-gh {background:rgba(201,209,217,.08);border-color:rgba(201,209,217,.15);} .soc-gh:hover{border-color:rgba(201,209,217,.4);}

    /* ── Info rows ── */
    .infos{padding:20px 24px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border);}
    .info-row{
      display:flex;align-items:center;gap:14px;
      padding:12px 16px;border-radius:14px;
      background:rgba(255,255,255,.025);border:1px solid var(--border);
      text-decoration:none;color:var(--text);
      transition:background .2s,border-color .2s;
      animation:rise .8s cubic-bezier(.22,1,.36,1) both;
    }
    .info-row:hover{background:rgba(56,189,248,.06);border-color:rgba(56,189,248,.25);}
    .info-icon{
      width:36px;height:36px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-size:16px;
    }
    .info-icon svg{width:18px;height:18px;display:block;}
    .info-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
    .info-value{font-size:14px;font-weight:500;}

    .ic-phone{background:rgba(34,197,94,.1);color:#22c55e;}
    .ic-mail {background:rgba(249,115,22,.1);color:#f97316;}
    .ic-loc  {background:rgba(168,85,247,.1);color:#a855f7;}

    /* ── Save button ── */
    .btn-save{
      margin:20px 24px 24px;display:block;
      padding:16px;border-radius:16px;border:none;
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;
      letter-spacing:.02em;cursor:pointer;
      box-shadow:0 4px 24px rgba(56,189,248,.3);
      transition:transform .2s,box-shadow .2s,opacity .2s;
      position:relative;overflow:hidden;
    }
    .btn-save::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
      transform:translateX(-100%);transition:transform .5s;
    }
    .btn-save:hover::before{transform:translateX(100%);}
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(56,189,248,.4);}
    .btn-save:active{transform:scale(.97);}
    .btn-save-inner{display:flex;align-items:center;justify-content:center;gap:10px;}

    /* ── Footer ── */
    .foot{
      padding:14px 24px;
      display:flex;align-items:center;justify-content:space-between;
      border-top:1px solid var(--border);
    }
    .foot-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
    .foot-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.5;}
  </style>
</head>
